extend type Query {
  coarNotificationsForManuscript(manuscriptId: ID!): [CoarNotification!]!
  paginatedCoarNotificationsForGroupOrNone(
    filters: [ManuscriptsFilter!]!
    groupId: ID!
    limit: Int
    offset: Int
  ): CoarNotificationSearchResponse!
}

extend type Mutation {
  resendCoarNotifyPayload(
    groupId: ID!
    notificationId: ID!
    payload: String!
  ): ResendCoarNotifyPayloadResponse!
}

type CoarNotification {
  id: ID!
  manuscriptId: ID
  manuscript: Manuscript
  payload: String!
  groupId: ID
  created: DateTime!
}

type ResendCoarNotifyPayloadResponse {
  success: Boolean!
  reason: String
}

type CoarNotificationSearchResponse {
  messages: [CoarNotification!]!
  totalCount: Int!
}
